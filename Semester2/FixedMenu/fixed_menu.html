<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Menu</title>

    <style>
        /* Mobile First */
        html{
            /* Temporary - delete */
            height: 200%;
        }
        body{
            background-color: rgb(0, 0, 0);
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body h2{
            color: rgb(251, 92, 0);
        }
        body p{
            color: rgb(251, 92, 0);
        }

        #fblogoheader{
            background-color: rgb(0, 0, 0);
            padding: 1rem;
            margin: 1rem;
        }
        
        #pageheader{
            background-color: white;
            padding: 1rem;
            /* Default */
            position: static;
        }


        img#logo{
            width: 80px;
            height: 80px;
            display: block;
            margin: auto;
            
        }
        #pageheader h1{
            color: rgb(251, 92, 0);
            text-align: center;
            /* Remove Color */
            background-color: rgb(252, 252, 252);
            border: 3px rgb(251, 92, 0) solid;
        }

        #pageheader nav{
            background-color: rgb(0, 0, 0);
            padding: .5rem;
            border-radius: 10px;
        }
        #pageheader ul{
            background-color: rgb(251, 92, 0);
            padding: .5rem;
            list-style: none;
                /* flexbox component */
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }
        #pageheader li{
            text-align: center;
            padding: .5rem;
            background-color: white;
            border: 2px solid black;
        }
        #pageheader a{
            color: rgb(251, 92, 0);
            text-decoration: none;
        }

        /* Non pageheader items */
        main{
            padding: 1rem;
        }
        h2{
            color:rgb(0, 0, 0);
        }
        p{
                line-height: 1.5;
                color: rgb(0, 0, 0);
        }

        /* Tablet and Desktop CSS */
        @media screen and (min-width: 650px)
        {
            body{
                background-color: wheat;
            }
            #pageheader{
                position: fixed;
                background-color: w;
                top: 0;
                left: 0;
                right: 0;
                /* flexbox component */
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            #fblogoheader{
                /* flexbox component */
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            #pageheader nav{
                min-width: 400px;
            }
            #pageheader ul{
                flex-direction: row;
                justify-content: center;

            }
                
            main{
                padding-top: 200px;
            }
        }
    </style>
</head>
<body>
  <header id="pageheader">
    <!-- Start the logo and header -->
    <div id="fblogoheader">
        <img id="logo" src="Images/paws_logo.png" alt="Paws Logo">
        <h1>Paws and Whiskers</h1>
    </div>
    <!-- End the logo and header -->

    <!-- Start the navigation -->

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Our Pets</a></li>
            <li><a href="#">Testimonials</a></li>
            <li><a href="#">About Us</a></li>
        </ul>
    </nav>
    <!-- End the navigation -->

  </header>  

    <main>
        <h2>Fixed Menu</h2>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Beatae sit impedit alias id, recusandae pariatur ullam atque neque temporibus, est quo porro. Odio asperiores error ea doloribus temporibus autem soluta?</p>
    </main>

</body>
</html>
